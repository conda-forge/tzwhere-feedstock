{% set name = "tzwhere" %}
{% set version = "3.0.3" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/tzwhere-{{ version }}.tar.gz
  sha256: b9a056e60f6ad5d44e7bc9d397ae683ea4bcd81f812ab6bbdfaad3d9984fcf19

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - python >={{ python_min }}
    - shapely

test:
  imports:
    - tzwhere
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/pegler/pytzwhere
  summary: Python library to look up timezone from lat / long offline
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ickc
